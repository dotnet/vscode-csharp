trigger: none
pr: none

parameters:
  - name: test
    type: boolean
    default: false

variables:
# This is expected to provide pat to tag release.
- group: DncEng-Partners-Tokens

resources:
  repositories:
  - repository: 1ESPipelineTemplates
    type: git
    name: 1ESPipelineTemplates/1ESPipelineTemplates
    ref: refs/tags/release
  pipelines:
  - pipeline: officialBuildCI
    source: dotnet-vscode-csharp
    branch: main
extends:
  template: v1/1ES.Official.PipelineTemplate.yml@1ESPipelineTemplates
  parameters:
    pool:
      name: netcore1espool-internal
      image: 1es-windows-2022
      os: windows
    customBuildTags:
    - ES365AIMigrationTooling
    stages:
    - stage: PublishStage
      jobs:
      - deployment: PublishToMarketplace
        displayName: PublishToMarketplace
        environment: vscode-csharp-release-approvals
        pool:
          name: netcore1espool-internal
          image: 1es-ubuntu-2204
          os: linux
        templateContext:
          type: releaseJob
          isProduction: true
          inputs:
          - input: pipelineArtifact
            pipeline: officialBuildCI
            artifactName: Packages
            destinationPath: $(Pipeline.Workspace)
        strategy:
          runOnce:
            deploy:
              steps:
              - pwsh: |
                  $artifactVersion = '$(resources.pipeline.officialBuildCI.runName)'
                  $artifactBranchName = '$(resources.pipeline.officialBuildCI.sourceBranch)' -replace 'refs/heads/',''

                  # Set the BuildNumber in the form `# Publish prerelease v2.69.22 #` to improve readability in AzDO
                  $buildNumberName = "Publish $artifactBranchName $artifactVersion"
                  if ('${{ parameters.test }}' -eq 'true') {
                    $buildNumberName = 'Test ' + $buildNumberName
                  }

                  # Replace invalid characters
                  $buildNumberName = $buildNumberName -replace '["/:<>\|?@*]','_'
                  # Maximum buildnumber length is 255 chars and we are going to add a prefix and suffix so ensure we have space.
                  if ($buildNumberName.Length -GT 252) {
                    $buildNumberName = $buildNumberName.Substring(0, 252)
                  }
                  # Avoid ever ending the BuildNumber with a `.` by always appending to it.
                  $buildNumberName = ' ' + $buildNumberName + ' #'

                  Write-Host "##vso[build.updatebuildnumber]$buildNumberName"
                displayName: Set BuildNumber
              - template: /azure-pipelines/install-node.yml@self
              - pwsh: |
                  npm install --global @vscode/vsce
                displayName: 'Install vsce'
              - task: AzureCLI@2
                displayName: '🚀 Publish to Marketplace'
                name: PublishToMarketplaceStep
                inputs:
                  azureSubscription: 'VSCode Marketplace Publishing'
                  scriptType: "pscore"
                  scriptLocation: 'inlineScript'
                  workingDirectory: $(Pipeline.Workspace)
                  inlineScript: |
                    # Choose whether to upload to prerelease or release based on the artifacts generated by the build pipeline.
                    $artifactFolder = ""
                    $uploadPrerelease = $true
                    if (Test-Path -Path "VSIX_Prerelease") {
                        $artifactFolder = "VSIX_Prerelease"
                        $uploadPrerelease = $true
                    } elseif (Test-Path -Path "VSIX_Release") {
                        $artifactFolder = "VSIX_Release"
                        $uploadPrerelease = $false
                    } else {
                        throw "No artifacts are downloaded."
                    }

                    Write-Host "Uploading artifacts from $artifactFolder with prerelease=$uploadPrerelease"

                    # Our build pipeline would generated build based on attempt number. Publishing the latest attempt.
                    $allArtifacts = Get-ChildItem -Path "$artifactFolder*" | Sort-Object -Descending
                    if ($allArtifacts.Length -eq 0) {
                      throw "No artifacts in $artifactFolder"
                    }

                    $publishArtifacts = $allArtifacts[0]
                    Write-Host "All artifacts: $($allArtifacts). Publishing $($publishArtifacts)."

                    $basePublishArgs = , "publish"
                    If ( $uploadPrerelease ) {
                      $basePublishArgs += "--pre-release"
                      Write-Host "Publish to pre-release channel."
                      Write-Host "##vso[task.setvariable variable=isPrerelease;isOutput=true]true"
                    } Else {
                      Write-Host "Publish to release channel."
                      Write-Host "##vso[task.setvariable variable=isPrerelease;isOutput=true]false"
                    }
                    $basePublishArgs += '--azure-credential'
                    $basePublishArgs += '--packagePath'
                    $publishArgs = $basePublishArgs + (Get-ChildItem $publishArtifacts\*.vsix | Sort-Object Name -Descending |% { $_ })
                    $publishArgs += '--manifestPath'
                    $publishArgs += (Get-ChildItem $publishArtifacts\*.manifest | Sort-Object Name -Descending |% { $_ })
                    $publishArgs += '--signaturePath'
                    $publishArgs += (Get-ChildItem $publishArtifacts\*.signature.p7s | Sort-Object Name -Descending |% { $_ })

                    If ("${{ parameters.test }}" -eq "true") {
                      Write-Host "In test mode, command is printed instead of run."
                      Write-Host "##[command]vsce $publishArgs"

                      Write-Host "🔒 Verify PAT."
                      vsce verify-pat --azure-credential ms-dotnettools
                    }
                    Else {
                      Write-Host "##[command]vsce $publishArgs"

                      function Test-AlreadyPublishedFailure {
                        param(
                          [string]$CommandOutput
                        )

                        if ([string]::IsNullOrWhiteSpace($CommandOutput)) {
                          return $false
                        }

                        # Match the duplicate-package error format emitted by vsce, for example:
                        # "ERROR  ms-dotnettools.csharp (win32-x64) v2.146.2 already exists."
                        foreach ($commandOutputLine in ($CommandOutput -split '\r?\n')) {
                          if ($commandOutputLine -match '^\s*ERROR\s+.+\s+v[0-9A-Za-z.]+(?:-[0-9A-Za-z.]+)*\s+already exists\.\s*$') {
                            return $true
                          }
                        }

                        return $false
                      }

                      $retryDelaysInMinutes = @(1, 3, 5)
                      $maxAttempts = $retryDelaysInMinutes.Length + 1
                      $publishSucceeded = $false

                      for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
                        Write-Host "Publish attempt $attempt of $maxAttempts."

                        $publishOutput = & vsce @publishArgs 2>&1 | Out-String
                        $exitCode = $LASTEXITCODE

                        if (-not [string]::IsNullOrWhiteSpace($publishOutput)) {
                          Write-Host $publishOutput.TrimEnd()
                        }

                        $publishOutputLines = $publishOutput -split '\r?\n'
                        $nonEmptyPublishOutputLines = $publishOutputLines | Where-Object { -not [string]::IsNullOrWhiteSpace($_) }
                        $publishFailureSummary = $nonEmptyPublishOutputLines | Select-Object -Last 1
                        if ([string]::IsNullOrWhiteSpace($publishFailureSummary)) {
                          $publishFailureSummary = "No output captured from vsce."
                        }

                        if ($exitCode -eq 0) {
                          Write-Host "vsce publish succeeded."
                          $publishSucceeded = $true
                          break
                        }

                        if (Test-AlreadyPublishedFailure -CommandOutput $publishOutput) {
                          Write-Warning "vsce publish reported that the package version already exists. Treating this duplicate-package result as successful."
                          $publishSucceeded = $true
                          break
                        }

                        if ($attempt -lt $maxAttempts) {
                          $delayMinutes = $retryDelaysInMinutes[$attempt - 1]
                          Write-Warning "vsce publish failed with exit code $exitCode on attempt $attempt of $maxAttempts. Last output: $publishFailureSummary. Retrying in $delayMinutes minute(s)."
                          Start-Sleep -Seconds ($delayMinutes * 60)
                        }
                      }

                      if (-not $publishSucceeded) {
                        throw "vsce publish failed after $maxAttempts attempts. See the logs above for the final error output."
                      }
                    }

    - stage: 'TagRelease'
      displayName: 'Tag release of vscode-csharp'
      dependsOn: 'PublishStage'
      condition: succeeded('PublishStage')
      variables:
      - name: isPrerelease
        value: $[ stageDependencies.PublishStage.PublishToMarketplace.outputs['PublishToMarketplace.PublishToMarketplaceStep.isPrerelease'] ]
      jobs:
      - job: 'Tag'
        pool:
          name: netcore1espool-internal
          image: 1es-ubuntu-2204
          os: linux
        steps:
        - checkout: self
          clean: true
          submodules: false
          fetchTags: false
          # fetchDepth is defaulted to 1 in the pipeline definition. Passing 0 here ensures we get
          # all the history including the officialBuildCI.sourceCommit.
          fetchDepth: 0
        - pwsh: |
            git checkout $(resources.pipeline.officialBuildCI.sourceCommit)
          displayName: 'Checkout build source branch'
        - template: /azure-pipelines/install-node.yml@self
        - pwsh: |
            npm ci
            npm install
          displayName: 'Install dependencies.'
        - pwsh: |
            # build number is generated by nerdbank git versioning and set to AzureDev
            npm run createTags -- --releaseVersion $(resources.pipeline.officialBuildCI.runName) --releaseCommit $(resources.pipeline.officialBuildCI.sourceCommit) --dryRun ${{ parameters.test }} --prerelease $(isPrerelease)
          env:
            GitHubPAT: $(BotAccount-dotnet-bot-content-rw-grained-pat)
          displayName: 'Create release tags'
