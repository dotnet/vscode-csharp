trigger: none
pr: none

parameters:
  - name: test
    type: boolean
    default: false

variables:
# This is expected to provide pat to tag release.
- group: DncEng-Partners-Tokens

resources:
  repositories:
  - repository: 1ESPipelineTemplates
    type: git
    name: 1ESPipelineTemplates/1ESPipelineTemplates
    ref: refs/tags/release
  pipelines:
  - pipeline: officialBuildCI
    source: dotnet-vscode-csharp
    branch: main
extends:
  template: v1/1ES.Official.PipelineTemplate.yml@1ESPipelineTemplates
  parameters:
    pool:
      name: netcore1espool-internal
      image: 1es-windows-2022
      os: windows
    customBuildTags:
    - ES365AIMigrationTooling
    stages:
    - stage: PublishStage
      jobs:
      - deployment: PublishToMarketplace
        displayName: PublishToMarketplace
        environment: vscode-csharp-release-approvals
        pool:
          name: netcore1espool-internal
          image: 1es-ubuntu-2204
          os: linux
        templateContext:
          type: releaseJob
          isProduction: true
          inputs:
          - input: pipelineArtifact
            pipeline: officialBuildCI
            artifactName: Packages
            destinationPath: $(Pipeline.Workspace)
        strategy:
          runOnce:
            deploy:
              steps:
              - pwsh: |
                  $artifactVersion = '$(resources.pipeline.officialBuildCI.runName)'
                  $artifactBranchName = '$(resources.pipeline.officialBuildCI.sourceBranch)' -replace 'refs/heads/',''

                  # Set the BuildNumber in the form `# Publish prerelease v2.69.22 #` to improve readability in AzDO
                  $buildNumberName = "Publish $artifactBranchName $artifactVersion"
                  if ('${{ parameters.test }}' -eq 'true') {
                    $buildNumberName = 'Test ' + $buildNumberName
                  }

                  # Replace invalid characters
                  $buildNumberName = $buildNumberName -replace '["/:<>\|?@*]','_'
                  # Maximum buildnumber length is 255 chars and we are going to add a prefix and suffix so ensure we have space.
                  if ($buildNumberName.Length -GT 252) {
                    $buildNumberName = $buildNumberName.Substring(0, 252)
                  }
                  # Avoid ever ending the BuildNumber with a `.` by always appending to it.
                  $buildNumberName = ' ' + $buildNumberName + ' #'

                  Write-Host "##vso[build.updatebuildnumber]$buildNumberName"
                displayName: Set BuildNumber
              - task: UseNode@1
                displayName: 'Install Node.js 24.x'
                inputs:
                  version: '24.x'
              - task: AzureCLI@2
                displayName: '🚀 Publish to Marketplace'
                name: PublishToMarketplaceStep
                inputs:
                  azureSubscription: 'VSCode Marketplace Publishing'
                  scriptType: "pscore"
                  scriptLocation: 'inlineScript'
                  workingDirectory: $(Pipeline.Workspace)
                  inlineScript: |
                    # Choose whether to upload to prerelease or release based on the artifacts generated by the build pipeline.
                    $artifactFolder = ""
                    $uploadPrerelease = $true
                    if (Test-Path -Path "VSIX_Prerelease") {
                        $artifactFolder = "VSIX_Prerelease"
                        $uploadPrerelease = $true
                    } elseif (Test-Path -Path "VSIX_Release") {
                        $artifactFolder = "VSIX_Release"
                        $uploadPrerelease = $false
                    } else {
                        throw "No artifacts are downloaded."
                    }

                    Write-Host "Uploading artifacts from $artifactFolder with prerelease=$uploadPrerelease"
                    Write-Host "##vso[task.setvariable variable=isPrerelease;isOutput=true]$($uploadPrerelease.ToString().ToLowerInvariant())"

                    # Our build pipeline would generate builds based on attempt number. Publish the latest attempt.
                    $allArtifacts = @(Get-ChildItem -Path "$artifactFolder*" | Sort-Object -Property Name -Descending)
                    if ($allArtifacts.Length -eq 0) {
                       throw "No artifacts in $artifactFolder"
                    }

                    $publishArtifacts = $allArtifacts[0]
                    Write-Host "All artifacts: $($allArtifacts). Publishing $($publishArtifacts)."
                    $publishScript = Join-Path '$(Pipeline.Workspace)' 'Publish-Vsix.ps1'
                    $publishArgs = @('-Path', $publishArtifacts.FullName)
                    if ($uploadPrerelease) {
                      Write-Host "Publish to pre-release channel."
                      $publishArgs += '-PreRelease'
                    } else {
                      Write-Host "Publish to release channel."
                    }

                    if ("${{ parameters.test }}" -eq "true") {
                      Write-Host "In test mode, publish commands are printed instead of executed."
                      $publishArgs += '-DryRun'
                    }

                    $publishArgs += '-CI'

                    Write-Host "##[command]& $publishScript $publishArgs"
                    & $publishScript @publishArgs

    - stage: 'TagRelease'
      displayName: 'Tag release of vscode-csharp'
      dependsOn: 'PublishStage'
      condition: succeeded('PublishStage')
      variables:
      - name: isPrerelease
        value: $[ stageDependencies.PublishStage.PublishToMarketplace.outputs['PublishToMarketplace.PublishToMarketplaceStep.isPrerelease'] ]
      jobs:
      - job: 'Tag'
        pool:
          name: netcore1espool-internal
          image: 1es-ubuntu-2204
          os: linux
        steps:
        - checkout: self
          clean: true
          submodules: false
          fetchTags: false
          # fetchDepth is defaulted to 1 in the pipeline definition. Passing 0 here ensures we get
          # all the history including the officialBuildCI.sourceCommit.
          fetchDepth: 0
        - pwsh: |
            git checkout $(resources.pipeline.officialBuildCI.sourceCommit)
          displayName: 'Checkout build source branch'
        - template: /azure-pipelines/install-node.yml@self
        - pwsh: |
            npm ci
            npm install
          displayName: 'Install dependencies.'
        - pwsh: |
            # build number is generated by nerdbank git versioning and set to AzureDev
            npm run createTags -- --releaseVersion $(resources.pipeline.officialBuildCI.runName) --releaseCommit $(resources.pipeline.officialBuildCI.sourceCommit) --dryRun ${{ parameters.test }} --prerelease $(isPrerelease)
          env:
            GitHubPAT: $(BotAccount-dotnet-bot-content-rw-grained-pat)
          displayName: 'Create release tags'
